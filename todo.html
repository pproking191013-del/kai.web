<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{width:320px;padding:20px;border-radius:16px;box-shadow:0 0 20px #a855f7;}
input,button{padding:8px;margin-top:5px;}
ul{list-style:none;padding:0;margin-top:10px;}

li{
  background:#222;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  touch-action:pan-y;
}

.done{opacity:0.5;text-decoration:line-through;}

.progress{
  height:6px;
  background:#444;
  border-radius:10px;
  margin-top:10px;
}
.bar{
  height:6px;
  background:#a855f7;
  width:0%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>To-Do</h2>

<input id="task" placeholder="task">
<input type="date" id="date">
<button onclick="add()">Add</button>

<ul id="list"></ul>

<div class="progress"><div class="bar" id="bar"></div></div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")||"[]");
const list=document.getElementById("list");
const bar=document.getElementById("bar");

/* SOUND */
function beep(freq){
  const ctx=new AudioContext();
  const osc=ctx.createOscillator();
  osc.frequency.value=freq;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.05);
}

function save(){
  localStorage.setItem("tasks",JSON.stringify(tasks));
  render();
}

function render(){
  list.innerHTML="";
  let doneCount=0;

  tasks.forEach((t,i)=>{
    if(t.done) doneCount++;

    const li=document.createElement("li");
    li.draggable=true;

    li.innerHTML = `
      <span>${t.text} (${t.date||"no date"})</span>
      <span>✔️</span>
    `;

    if(t.done) li.classList.add("done");

    li.onclick=()=>{
      t.done=!t.done;
      beep(800);
      save();
    };

    /* swipe delete */
    let startX=0;
    li.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
    li.addEventListener("touchend",e=>{
      let endX=e.changedTouches[0].clientX;
      if(startX-endX>50){
        tasks.splice(i,1);
        beep(200);
        save();
      }
    });

    /* drag reorder */
    li.ondragstart=()=>li.classList.add("drag");
    li.ondragend=()=>li.classList.remove("drag");

    list.appendChild(li);
  });

  /* progress */
  let percent = tasks.length ? (doneCount/tasks.length)*100 : 0;
  bar.style.width = percent+"%";
}

/* reorder logic */
list.addEventListener("dragover",e=>{
  e.preventDefault();
  const dragging=document.querySelector(".drag");
  const after = [...list.children].find(child=>{
    return e.clientY <= child.offsetTop + child.offsetHeight/2;
  });
  list.insertBefore(dragging, after);
});

/* rebuild order */
list.addEventListener("drop",()=>{
  const newTasks=[];
  [...list.children].forEach(li=>{
    const text=li.innerText.split(" (")[0];
    const t = tasks.find(x=>x.text===text);
    newTasks.push(t);
  });
  tasks=newTasks;
  save();
});

function add(){
  const text=document.getElementById("task").value;
  const date=document.getElementById("date").value;

  if(!text) return;

  tasks.push({text, date, done:false});
  beep(1200);

  document.getElementById("task").value="";
  save();
}

render();
</script>

</body>
</html>
