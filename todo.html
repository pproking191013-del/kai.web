<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  font-family:Arial;
  margin:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  transition:0.3s;
}

body.dark{background:#000;color:white;}
body.light{background:#fff;color:black;}

.box{
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 20px #a855f7;
  width:90%;
  max-width:300px;
}

input{
  width:70%;
  padding:10px;
}

button{
  padding:10px;
  background:#a855f7;
  color:white;
  border:none;
  border-radius:6px;
}

li{
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>To-Do</h2>
  <input id="task" placeholder="Add task">
  <button onclick="add()">Add</button>

  <ul id="list"></ul>
</div>

<script>
const list = document.getElementById("list");

function load(){
  list.innerHTML="";
  JSON.parse(localStorage.getItem("tasks")||"[]")
  .forEach((t,i)=>{
    const li=document.createElement("li");
    li.textContent=t;
    li.onclick=()=>remove(i);
    list.appendChild(li);
  });
}

function add(){
  const val=document.getElementById("task").value;
  if(!val) return;
  const tasks=JSON.parse(localStorage.getItem("tasks")||"[]");
  tasks.push(val);
  localStorage.setItem("tasks",JSON.stringify(tasks));
  document.getElementById("task").value="";
  load();
}

function remove(i){
  const tasks=JSON.parse(localStorage.getItem("tasks"));
  tasks.splice(i,1);
  localStorage.setItem("tasks",JSON.stringify(tasks));
  load();
}

/* THEME SYNC */
function applyTheme(){
  const theme = localStorage.getItem("theme") || "dark";
  document.body.className = theme;
}

applyTheme();
load();
</script>

</body>
</html>
