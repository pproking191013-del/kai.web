<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  transition:0.3s;
}

body.dark{background:#000;color:white;}
body.light{background:#fff;color:black;}

.box{
  width:320px;
  padding:20px;
  border-radius:16px;
  box-shadow:0 0 20px #a855f7;
}

input,button{
  padding:8px;
  margin-top:5px;
}

ul{
  list-style:none;
  padding:0;
  margin-top:10px;
}

li{
  background:#222;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.done{
  opacity:0.5;
  text-decoration:line-through;
}

/* notification popup */
#notif{
  position:fixed;
  top:20px;
  right:20px;
  background:#a855f7;
  color:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 20px #a855f7;
  display:none;
  animation:slide 0.4s ease;
}

@keyframes slide{
  from{transform:translateX(100%);opacity:0;}
  to{transform:translateX(0);opacity:1;}
}
</style>
</head>

<body>

<div class="box">
<h2>To-Do</h2>

<input id="task" placeholder="task">
<input type="datetime-local" id="date">
<button onclick="add()">Add</button>

<ul id="list"></ul>
</div>

<div id="notif"></div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")||"[]");
const list=document.getElementById("list");
const notif=document.getElementById("notif");

/* SOUND */
function beep(){
  const ctx=new AudioContext();
  const osc=ctx.createOscillator();
  osc.frequency.value=900;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.1);
}

/* SAVE */
function save(){
  localStorage.setItem("tasks",JSON.stringify(tasks));
  render();
}

/* RENDER */
function render(){
  list.innerHTML="";
  tasks.forEach((t,i)=>{
    const li=document.createElement("li");

    li.innerHTML = `
      <span>${t.text} ${t.date ? "(" + t.date + ")" : ""}</span>
      <span>✔️</span>
    `;

    if(t.done) li.classList.add("done");

    li.onclick=()=>{
      t.done=!t.done;
      save();
    };

    list.appendChild(li);
  });
}

/* ADD */
function add(){
  const text=document.getElementById("task").value;
  const date=document.getElementById("date").value;

  if(!text) return;

  tasks.push({
    text,
    date,
    done:false,
    notified:false
  });

  document.getElementById("task").value="";
  save();
}

/* NOTIFICATION */
function showNotif(msg){
  notif.textContent = msg;
  notif.style.display="block";
  beep();

  setTimeout(()=>{
    notif.style.display="none";
  },4000);
}

/* CHECK DUE TASKS */
function checkDue(){
  const now = new Date();

  tasks.forEach(t=>{
    if(!t.date || t.done || t.notified) return;

    const due = new Date(t.date);

    if(now >= due){
      showNotif("⏰ " + t.text + " is due!");
      t.notified = true;
      save();
    }
  });
}

/* theme */
document.body.className = localStorage.getItem("theme") || "dark";

/* run */
render();
setInterval(checkDue, 5000);
</script>

</body>
</html>
