<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  transition:0.3s;
}

body.dark{background:#000;color:white;}
body.light{background:#fff;color:black;}

.box{
  width:90%;
  max-width:340px;
  padding:20px;
  border-radius:16px;
  box-shadow:0 0 25px #a855f7;
  backdrop-filter:blur(10px);
}

h2{
  text-align:center;
  color:#a855f7;
}

.inputRow{
  display:flex;
  gap:5px;
  margin-top:10px;
}

input, select{
  padding:10px;
  border-radius:8px;
  border:none;
  flex:1;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#a855f7;
  color:white;
  cursor:pointer;
}

ul{
  list-style:none;
  margin-top:15px;
  padding:0;
}

li{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  animation:fadeIn 0.3s ease;
  transition:0.2s;
}

li.done{
  text-decoration:line-through;
  opacity:0.5;
}

.category{
  font-size:10px;
  padding:3px 6px;
  border-radius:6px;
  background:#a855f7;
  margin-left:5px;
}

.actions{
  display:flex;
  gap:8px;
}

.check{
  cursor:pointer;
}

.delete{
  cursor:pointer;
  color:red;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="box">
  <h2>To-Do</h2>

  <div class="inputRow">
    <input id="task" placeholder="Add task">
    <select id="cat">
      <option>School</option>
      <option>Work</option>
      <option>Personal</option>
      <option>Other</option>
    </select>
    <button onclick="add()">+</button>
  </div>

  <ul id="list"></ul>
</div>

<script>
const list = document.getElementById("list");

function load(){
  list.innerHTML="";
  const tasks = JSON.parse(localStorage.getItem("tasks")||"[]");

  tasks.forEach((t,i)=>{
    const li=document.createElement("li");
    if(t.done) li.classList.add("done");

    li.innerHTML = `
      <span>
        ${t.text}
        <span class="category">${t.cat}</span>
      </span>

      <div class="actions">
        <span class="check">✔️</span>
        <span class="delete">🗑</span>
      </div>
    `;

    li.querySelector(".check").onclick=()=>{
      t.done = !t.done;
      save(tasks);
    };

    li.querySelector(".delete").onclick=()=>{
      tasks.splice(i,1);
      save(tasks);
    };

    list.appendChild(li);
  });
}

function add(){
  const text=document.getElementById("task").value;
  const cat=document.getElementById("cat").value;

  if(!text) return;

  const tasks=JSON.parse(localStorage.getItem("tasks")||"[]");

  tasks.push({
    text:text,
    cat:cat,
    done:false
  });

  save(tasks);
  document.getElementById("task").value="";
}

function save(tasks){
  localStorage.setItem("tasks",JSON.stringify(tasks));
  load();
}

/* THEME SYNC */
document.body.className = localStorage.getItem("theme") || "dark";

load();
</script>

</body>
</html>
