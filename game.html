<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

body.dark{background:#000;color:white;}
body.light{background:#fff;color:black;}

h2{margin-bottom:10px;}

#box{
  width:120px;
  height:120px;
  background:#333;
  border-radius:10px;
  box-shadow:0 0 15px #a855f7;
  margin:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s;
}

#box.active{
  background:#a855f7;
}

#result{
  margin-top:10px;
}

#leaderboard{
  margin-top:20px;
  text-align:center;
}
</style>
</head>

<body>

<h2>Reaction Game</h2>

<div id="box"></div>
<p id="result">0 ms</p>

<div id="leaderboard">
  <h3>Top 5</h3>
  <div id="scores"></div>
</div>

<script>
const SUPABASE_URL = "https://yxjcuiyqddqyrlzjcjby.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // keep yours

const box = document.getElementById("box");
const result = document.getElementById("result");
const scoresDiv = document.getElementById("scores");

let start, ready;

/* theme sync */
document.body.className = localStorage.getItem("theme") || "dark";

/* SOUND */
function beep(){
  const ctx=new AudioContext();
  const osc=ctx.createOscillator();
  osc.frequency.value=800;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.1);
}

/* start */
function startGame(){
  ready=false;
  box.classList.remove("active");

  setTimeout(()=>{
    box.classList.add("active");
    start=Date.now();
    ready=true;
  },Math.random()*2000+1000);
}

box.onclick=()=>{
  if(!ready){
    result.textContent="too early";
    return;
  }

  const t = Date.now() - start;
  result.textContent = t + " ms";
  beep();

  saveScore(t);
  startGame();
};

/* SAVE TO SUPABASE */
async function saveScore(time){
  const name = localStorage.getItem("playerName") || prompt("name?") || "anon";
  localStorage.setItem("playerName", name);

  await fetch(SUPABASE_URL + "/rest/v1/scores", {
    method:"POST",
    headers:{
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({name, time})
  });

  loadScores();
}

/* LOAD TOP 5 */
async function loadScores(){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/scores?select=*&order=time.asc&limit=5",
    {
      headers:{
        "apikey": SUPABASE_KEY,
        "Authorization":"Bearer "+SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  scoresDiv.innerHTML = data.map(s => 
    `<div>${s.name}: ${s.time} ms</div>`
  ).join("");
}

startGame();
loadScores();
</script>

</body>
</html>
