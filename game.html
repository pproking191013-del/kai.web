<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  background:#0f172a;
  color:white;
}

h2{
  margin-bottom:10px;
}

/* GAME BOX */
#box{
  width:140px;
  height:140px;
  background:#ff3b3b; /* red = wait */
  border-radius:15px;
  margin:20px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 20px #a855f7;
  transition:0.15s;
}

#box:active{
  transform:scale(0.95);
}

/* TEXT */
#result{
  font-size:18px;
  margin-top:10px;
}

#best{
  margin-top:5px;
  opacity:0.7;
}
</style>
</head>

<body>

<h2>Reaction Game</h2>

<div id="box"></div>

<p id="result">wait...</p>
<p id="best"></p>

<script>
const box = document.getElementById("box");
const result = document.getElementById("result");
const bestText = document.getElementById("best");

let start = 0;
let ready = false;
let timeout;

/* load best score */
let best = localStorage.getItem("best") || null;
if(best){
  bestText.textContent = "Best: " + best + " ms";
}

/* start round */
function startGame(){
  ready = false;

  box.style.background = "#ff3b3b"; // RED
  result.textContent = "wait...";

  clearTimeout(timeout);

  timeout = setTimeout(()=>{
    box.style.background = "#22c55e"; // GREEN
    result.textContent = "CLICK!";
    start = Date.now();
    ready = true;
  }, Math.random()*2000 + 1000);
}

/* click */
box.onclick = ()=>{
  // too early
  if(!ready){
    result.textContent = "too early 💀";
    clearTimeout(timeout);
    setTimeout(startGame, 1000);
    return;
  }

  // correct click
  const time = Date.now() - start;
  result.textContent = time + " ms";

  // save best
  if(!best || time < best){
    best = time;
    localStorage.setItem("best", best);
    bestText.textContent = "Best: " + best + " ms";
  }

  ready = false;

  setTimeout(startGame, 1000);
};

startGame();
</script>

</body>
</html>
