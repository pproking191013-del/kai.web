<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  background:#111;
  color:white;
}

.container{
  background:#000;
  padding:25px;
  border-radius:20px;
  box-shadow:0 0 30px #a855f7;
  text-align:center;
  width:260px;
}

#box{
  width:140px;
  height:140px;
  background:#ff3b3b;
  border-radius:15px;
  margin:20px auto;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 20px #a855f7;
  transition:0.15s;
}

#box:active{ transform:scale(0.95); }

#result{ font-size:18px; }
#best{ opacity:0.7; margin-top:5px; }

#leaderboard{
  margin-top:15px;
  font-size:14px;
  text-align:left;
}
</style>
</head>

<body>

<div class="container">
  <h2>Reaction Game</h2>

  <div id="box"></div>

  <p id="result">wait...</p>
  <p id="best"></p>

  <div id="leaderboard">
    <b>Top 5 (this device)</b>
    <ol id="scores"></ol>
  </div>
</div>

<script>
const box = document.getElementById("box");
const result = document.getElementById("result");
const bestText = document.getElementById("best");
const scoresList = document.getElementById("scores");

const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

let start = 0;
let ready = false;
let timeout;

/* load best */
let best = localStorage.getItem("best");
if(best){
  bestText.textContent = "Best: " + best + " ms";
}

/* leaderboard array */
let scores = JSON.parse(localStorage.getItem("scores") || "[]");

/* start game */
function startGame(){
  ready = false;
  box.style.background = "#ff3b3b";
  result.textContent = "wait...";

  clearTimeout(timeout);

  timeout = setTimeout(()=>{
    box.style.background = "#22c55e";
    result.textContent = "CLICK!";
    start = Date.now();
    ready = true;
  }, Math.random()*2000 + 1000);
}

/* click */
box.onclick = ()=>{
  if(!ready){
    result.textContent = "too early 💀";
    clearTimeout(timeout);
    setTimeout(startGame, 1000);
    return;
  }

  clickSound.play();

  const time = Date.now() - start;
  result.textContent = time + " ms";

  /* best */
  if(!best || time < best){
    best = time;
    localStorage.setItem("best", best);
    bestText.textContent = "Best: " + best + " ms";
  }

  /* name */
  let name = localStorage.getItem("player");
  if(!name){
    name = prompt("enter name");
    localStorage.setItem("player", name);
  }

  /* save score */
  scores.push({ name, time });

  /* sort fastest */
  scores.sort((a,b)=>a.time - b.time);

  /* keep top 5 */
  scores = scores.slice(0,5);

  localStorage.setItem("scores", JSON.stringify(scores));

  renderScores();

  ready = false;
  setTimeout(startGame, 1000);
};

/* render leaderboard */
function renderScores(){
  scoresList.innerHTML = "";
  scores.forEach(s=>{
    const li = document.createElement("li");
    li.textContent = s.name + " - " + s.time + "ms";
    scoresList.appendChild(li);
  });
}

renderScores();
startGame();
</script>

</body>
</html>
