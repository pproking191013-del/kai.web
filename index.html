<!DOCTYPE html>
<html>
<head>
  <title>ANIRUDH</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 60px;
      margin-top: 40px;
      letter-spacing: 3px;
      color: #4f9dff;

      text-shadow:
        0 0 5px #4f9dff,
        0 0 10px #4f9dff,
        0 0 20px #4f9dff,
        0 0 40px #4f9dff;

      animation: glow 2s infinite;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 5px #4f9dff; }
      50% { text-shadow: 0 0 25px #4f9dff, 0 0 50px #4f9dff; }
      100% { text-shadow: 0 0 5px #4f9dff; }
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .images {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .images img {
      width: 300px;
      border-radius: 12px;

      /* glow border */
      border: 2px solid #4f9dff;
      box-shadow:
        0 0 10px #4f9dff,
        0 0 20px #4f9dff,
        0 0 40px #4f9dff;

      transition: 0.3s;
    }

    .images img:hover {
      transform: scale(1.07);

      box-shadow:
        0 0 20px #4f9dff,
        0 0 40px #4f9dff,
        0 0 80px #4f9dff;
    }

    p {
      color: #9ca3af;
      font-size: 18px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ANIRUDH 67</h1>

    <p>My first website — built by me</p>

    <div class="images">
      <img src="image1.jpg">
      <img src="image2.jpg">
    </div>
  </div>
</body>
</html>
