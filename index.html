<!DOCTYPE html>
<html>
<head>
  <title>My Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    .container {
      max-width: 800px;
      margin: 100px auto;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #9ca3af;
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>My Website</h1>
    <p>Built by me. Clean and simple.</p>
    <a href="#" class="btn">Click me</a>
  </div>
</body>
</html>
