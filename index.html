<!DOCTYPE html>
<html>
<head>
  <title>KaiWeb</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: Arial, sans-serif;
      overflow: hidden;
      transition: background 0.5s ease, color 0.5s ease;
    }

    body.dark { background:#000; color:white; }
    body.light { background:#fff; color:black; }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .nav-links { display:flex; gap:20px; }

    .navbar a {
      cursor:pointer;
      text-decoration:none;
      padding:10px 14px;
      border-radius:8px;
    }

    body.dark .navbar { background:rgba(0,0,0,0.4); }
    body.light .navbar { background:rgba(255,255,255,0.6); }

    body.dark .navbar a { color:white; }
    body.light .navbar a { color:black; }

    .toggle { cursor:pointer; font-size:22px; padding:10px; }

    .section {
      position: absolute;
      top: 0;
      left: 100%;
      width: 100%;
      height: 100vh;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      transition: left 0.6s ease;
      text-align:center;
      padding:20px;
    }

    .section.active { left: 0; }

    body.dark #about { background: linear-gradient(270deg,#000,#4c1d95,#000); }
    body.dark #projects { background: linear-gradient(270deg,#020617,#1e3a8a,#020617); }
    body.dark #socials { background: linear-gradient(270deg,#000,#312e81,#000); }
    body.dark #game { background: linear-gradient(270deg,#000,#581c87,#000); }

    body.light #about { background: linear-gradient(270deg,#fff,#e9d5ff,#fff); }
    body.light #projects { background: linear-gradient(270deg,#fff,#dbeafe,#fff); }
    body.light #socials { background: linear-gradient(270deg,#fff,#ddd6fe,#fff); }
    body.light #game { background: linear-gradient(270deg,#fff,#f3e8ff,#fff); }

    h1 {
      font-size: 50px;
      color: #a855f7;
      text-shadow: 0 0 20px #a855f7;
    }

    p { margin-top:10px; opacity:0.8; }

    .project {
      margin-top:20px;
      padding:20px;
      border-radius:12px;
      background: rgba(255,255,255,0.05);
      width:300px;
      max-width:90%;
    }

    iframe {
      margin-top:10px;
      width:100%;
      height:200px;
      border:none;
      border-radius:10px;
      box-shadow:0 0 20px #a855f7;
    }

    .socials a {
      margin:10px;
      font-size:26px;
      padding:12px;
      display:inline-block;
    }

    /* GAME */
    #gameArea {
      position: relative;
      width: 90%;
      max-width: 400px;
      height: 300px;
      border: 2px solid #a855f7;
      margin-top: 20px;
      overflow: hidden;
    }

    #target {
      width: 50px;
      height: 50px;
      background: #a855f7;
      position: absolute;
      border-radius: 10px;
      box-shadow: 0 0 20px #a855f7;
      cursor: pointer;
    }

    .score {
      margin-top: 10px;
      font-size: 18px;
    }

    @media (max-width: 768px) {
      h1 { font-size: 35px; }
      iframe { height: 180px; }
    }

  </style>
</head>

<body>

  <div class="navbar">
    <div class="nav-links">
      <a onclick="showSection('about')">About</a>
      <a onclick="showSection('projects')">Projects</a>
      <a onclick="showSection('game')">Game</a>
      <a onclick="showSection('socials')">Socials</a>
    </div>
    <span class="toggle" onclick="toggleTheme()">🌙</span>
  </div>

  <div class="section active" id="about">
    <h1 id="typing"></h1>
    <p>clean. simple. mine.</p>
  </div>

  <div class="section" id="projects">
    <h1>projects</h1>
    <div class="project">
      <h2>To-Do App</h2>
      <iframe src="todo.html"></iframe>
    </div>
  </div>

  <!-- GAME -->
  <div class="section" id="game">
    <h1>click game</h1>
    <p>tap the box fast</p>

    <div id="gameArea">
      <div id="target"></div>
    </div>

    <div class="score">
      Score: <span id="score">0</span> |
      Time: <span id="time">10</span>
    </div>
  </div>

  <div class="section" id="socials">
    <h1>socials</h1>
    <div class="socials">
      <a href="https://instagram.com/pro191013" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://snapchat.com/add/pro_king699" target="_blank"><i class="fab fa-snapchat"></i></a>
      <a href="https://www.tiktok.com/@pro_king690" target="_blank"><i class="fab fa-tiktok"></i></a>
      <a href="https://wa.me/447349901324" target="_blank"><i class="fab fa-whatsapp"></i></a>
    </div>
  </div>

  <script>
    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function setTheme(theme) {
      document.body.className = theme;
      document.querySelector('.toggle').textContent = theme === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
      const current = document.body.classList.contains('dark') ? 'dark' : 'light';
      setTheme(current === 'dark' ? 'light' : 'dark');
    }

    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    setTheme(saved || (prefersDark ? 'dark' : 'light'));

    // typing
    const text = "kaiweb";
    let i = 0;
    function type() {
      if (i < text.length) {
        document.getElementById("typing").innerHTML += text[i];
        i++;
        setTimeout(type, 120);
      }
    }
    type();

    // GAME LOGIC
    let score = 0;
    let time = 10;
    const target = document.getElementById("target");
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");

    function moveTarget() {
      const x = Math.random() * 300;
      const y = Math.random() * 200;
      target.style.left = x + "px";
      target.style.top = y + "px";
    }

    target.onclick = () => {
      score++;
      scoreEl.textContent = score;
      moveTarget();
    };

    function startGame() {
      score = 0;
      time = 10;
      scoreEl.textContent = score;
      timeEl.textContent = time;
      moveTarget();

      const timer = setInterval(() => {
        time--;
        timeEl.textContent = time;

        if (time <= 0) {
          clearInterval(timer);
          alert("Game Over! Score: " + score);
        }
      }, 1000);
    }

    // auto start when opening game tab
    document.querySelector('[onclick="showSection(\'game\')"]').addEventListener("click", startGame);
  </script>

</body>
</html>
