<!DOCTYPE html>
<html>
<head>
  <title>KaiWeb</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: Arial, sans-serif;
      overflow: hidden;
      transition: 0.5s;
    }

    body.dark { background:#000; color:white; }
    body.light { background:#fff; color:black; }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .nav-links { display:flex; gap:20px; }

    .navbar a {
      cursor:pointer;
      padding:10px 14px;
    }

    body.dark .navbar { background:rgba(0,0,0,0.4); }
    body.light .navbar { background:rgba(255,255,255,0.6); }

    h1 { font-size:50px; color:#a855f7; }

    .section {
      position:absolute;
      width:100%;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      left:100%;
      transition:0.5s;
    }

    .section.active { left:0; }

    /* GAME */
    #reactionBox {
      width:200px;
      height:200px;
      background:#333;
      border-radius:15px;
      margin-top:20px;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      box-shadow:0 0 20px #a855f7;
    }

    #reactionBox.active {
      background:#a855f7;
    }

    .stats {
      margin-top:15px;
      font-size:18px;
    }

    button {
      margin-top:10px;
      padding:10px 20px;
      border:none;
      border-radius:8px;
      background:#a855f7;
      color:white;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-links">
    <a onclick="showSection('about')">About</a>
    <a onclick="showSection('game')">Game</a>
  </div>
  <span onclick="toggleTheme()">🌙</span>
</div>

<div class="section active" id="about">
  <h1>kaiweb</h1>
  <p>reaction game below</p>
</div>

<div class="section" id="game">
  <h1>reaction test</h1>

  <div id="reactionBox">wait...</div>

  <div class="stats">
    Time: <span id="time">0</span> ms <br>
    Best: <span id="best">--</span> ms
  </div>

  <button onclick="startGame()">Start</button>
</div>

<script>
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toggleTheme(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

/* GAME LOGIC */
const box = document.getElementById("reactionBox");
const timeEl = document.getElementById("time");
const bestEl = document.getElementById("best");

let startTime = 0;
let timeout;
let ready = false;

/* load best */
let best = localStorage.getItem("bestTime");
if(best) bestEl.textContent = best;

function playSound(freq){
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  osc.frequency.value = freq;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.1);
}

function startGame(){
  box.classList.remove("active");
  box.textContent = "wait...";
  ready = false;

  clearTimeout(timeout);

  timeout = setTimeout(()=>{
    box.classList.add("active");
    box.textContent = "CLICK!";
    startTime = Date.now();
    ready = true;

    playSound(800); // ready sound

  }, Math.random()*2000 + 1000);
}

box.onclick = ()=>{
  if(!ready){
    box.textContent = "too early 💀";
    playSound(200);
    return;
  }

  const reaction = Date.now() - startTime;
  timeEl.textContent = reaction;

  playSound(1200);

  if(!best || reaction < best){
    best = reaction;
    localStorage.setItem("bestTime", best);
    bestEl.textContent = best;
  }

  box.classList.remove("active");
  box.textContent = "again?";
  ready = false;
};
</script>

</body>
</html>
