<!DOCTYPE html>
<html>
<head>
  <title>KaiWeb</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:Arial;
      overflow:hidden;
      transition:0.5s;
    }

    body.dark{background:#000;color:white;}
    body.light{background:#fff;color:black;}

    .navbar{
      position:fixed;
      top:0;width:100%;
      display:flex;
      justify-content:space-between;
      padding:15px 30px;
      backdrop-filter:blur(10px);
    }

    .nav-links{display:flex;gap:20px;}

    .section{
      position:absolute;
      width:100%;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      left:100%;
      transition:0.5s;
    }

    .section.active{left:0;}

    h1{font-size:50px;color:#a855f7;}

    iframe{
      width:300px;
      height:260px;
      border:none;
      border-radius:12px;
      margin-top:10px;
      box-shadow:0 0 20px #a855f7;
    }

    .project{
      margin-top:20px;
      text-align:center;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-links">
    <a onclick="showSection('about')">About</a>
    <a onclick="showSection('projects')">Projects</a>
  </div>
  <span onclick="toggleTheme()">🌙</span>
</div>

<div class="section active" id="about">
  <h1>kaiweb</h1>
</div>

<div class="section" id="projects">
  <h1>projects</h1>

  <div class="project">
    <h2>To-Do</h2>
    <iframe src="todo.html"></iframe>
  </div>

  <div class="project">
    <h2>Reaction Game</h2>
    <iframe src="game.html"></iframe>
  </div>

</div>

<script>
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setTheme(theme){
  document.body.className = theme;
  localStorage.setItem("theme",theme);
}

function toggleTheme(){
  const t = document.body.classList.contains("dark") ? "light":"dark";
  setTheme(t);
}

/* init */
const saved = localStorage.getItem("theme");
setTheme(saved || "dark");
</script>

</body>
</html>
