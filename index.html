<!DOCTYPE html>
<html>
<head>
  <title>ANIRUDH</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 50px;
      margin-top: 40px;
      letter-spacing: 2px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .images {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .images img {
      width: 300px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .images img:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ANIRUDH 67</h1>

    <div class="images">
      <img src="image1.jpg">
      <img src="image2.jpg">
    </div>
  </div>
</body>
</html>
