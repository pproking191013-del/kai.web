<!DOCTYPE html>
<html>
<head>
  <title>KaiWeb</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: Arial, sans-serif;
      overflow: hidden;
      transition: 0.5s;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .nav-links { display: flex; gap: 30px; }

    .navbar a {
      cursor: pointer;
      text-decoration: none;
    }

    body.dark .navbar { background: rgba(0,0,0,0.4); }
    body.light .navbar { background: rgba(255,255,255,0.6); }

    body.dark .navbar a { color: white; }
    body.light .navbar a { color: black; }

    .toggle { cursor: pointer; font-size: 22px; }

    /* SECTIONS */
    .section {
      position: absolute;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.6s;
    }

    .active {
      opacity: 1;
      pointer-events: all;
    }

    /* BG */
    body.dark #about { background: linear-gradient(270deg,#000,#4c1d95,#000); }
    body.dark #projects { background: linear-gradient(270deg,#020617,#1e3a8a,#020617); }
    body.dark #contact { background: linear-gradient(270deg,#000,#312e81,#000); }

    body.light #about { background: linear-gradient(270deg,#fff,#e9d5ff,#fff); }
    body.light #projects { background: linear-gradient(270deg,#fff,#dbeafe,#fff); }
    body.light #contact { background: linear-gradient(270deg,#fff,#ddd6fe,#fff); }

    /* TITLE */
    h1 {
      font-size: 70px;
      color: #a855f7;
      text-shadow: 0 0 20px #a855f7;
    }

    /* PROJECT */
    .project {
      margin-top: 30px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      width: 320px;
    }

    iframe {
      width: 350px;
      height: 400px;
      border: none;
      margin-top: 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px #a855f7;
    }

  </style>
</head>

<body>

  <!-- NAV -->
  <div class="navbar">
    <div class="nav-links">
      <a onclick="showSection('about')">About</a>
      <a onclick="showSection('projects')">Projects</a>
      <a onclick="showSection('contact')">Contact</a>
    </div>
    <span class="toggle" onclick="toggleTheme()">🌙</span>
  </div>

  <!-- ABOUT -->
  <div class="section active" id="about">
    <h1 id="typing"></h1>
  </div>

  <!-- PROJECTS -->
  <div class="section" id="projects">
    <h1>projects</h1>

    <div class="project">
      <h2>To-Do App</h2>
      <p>live preview</p>

      <!-- iframe preview -->
      <iframe src="todo.html"></iframe>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="section" id="contact">
    <h1>socials</h1>
  </div>

  <script>
    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function setTheme(theme) {
      document.body.className = theme;
      document.querySelector('.toggle').textContent = theme === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
      const current = document.body.classList.contains('dark') ? 'dark' : 'light';
      setTheme(current === 'dark' ? 'light' : 'dark');
    }

    // theme load
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    setTheme(saved || (prefersDark ? 'dark' : 'light'));

    // typing animation
    const text = "kaiweb";
    let i = 0;

    function type() {
      if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 120);
      }
    }

    type();
  </script>

</body>
</html>
