<!DOCTYPE html>
<html>
<head>

  <!-- ICONS (Font Awesome CDN) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      scroll-behavior: smooth;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: center;
      gap: 30px;
      background: #020617;
      padding: 15px;
      border-bottom: 1px solid #4f9dff;
      position: sticky;
      top: 0;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }

    .navbar a:hover {
      color: #4f9dff;
      text-shadow: 0 0 10px #4f9dff;
    }

    h1 {
      font-size: 60px;
      margin-top: 40px;
      letter-spacing: 3px;
      color: #4f9dff;
      text-shadow: 0 0 10px #4f9dff, 0 0 30px #4f9dff;
      animation: glow 2s infinite;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 10px #4f9dff; }
      50% { text-shadow: 0 0 30px #4f9dff, 0 0 60px #4f9dff; }
      100% { text-shadow: 0 0 10px #4f9dff; }
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .images {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .images img {
      width: 300px;
      border-radius: 12px;
      border: 2px solid #4f9dff;
      box-shadow: 0 0 20px #4f9dff, 0 0 40px #4f9dff;
      transition: 0.3s;
    }

    .images img:hover {
      transform: scale(1.07);
      box-shadow: 0 0 40px #4f9dff, 0 0 80px #4f9dff;
    }

    .section {
      margin-top: 80px;
    }

    p {
      color: #9ca3af;
      font-size: 18px;
    }

    /* SOCIAL ICONS */
    .socials {
      margin-top: 20px;
    }

    .socials a {
      display: inline-block;
      margin: 15px;
      font-size: 32px;
      color: white;
      transition: 0.3s;
    }

    .socials a:hover {
      color: #4f9dff;
      text-shadow: 0 0 15px #4f9dff;
      transform: scale(1.2);
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <a href="#about">About</a>
    <a href="#socials">Socials</a>
  </div>

  <!-- ABOUT -->

  </div>

  <!-- SOCIALS -->
  <div class="container section" id="socials">

    <div class="socials">
      <a href="https://instagram.com/pro191013" target="_blank">
        <i class="fab fa-instagram"></i>
      </a>

        <i class="fab fa-snapchat"></i>
      </a>

      <a href="https://www.tiktok.com/@pro_king690" target="_blank">
        <i class="fab fa-tiktok"></i>
      </a>

      <a href="https://wa.me/447349901324" target="_blank">
        <i class="fab fa-whatsapp"></i>
      </a>
    </div>
  </div>

</body>
</html>
