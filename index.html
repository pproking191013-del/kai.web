<!DOCTYPE html>
<html>
<head>
  <title>ANIRUDH</title>

  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: center;
      gap: 30px;
      background: #020617;
      padding: 15px;
      border-bottom: 1px solid #4f9dff;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .navbar a:hover {
      color: #4f9dff;
      text-shadow: 0 0 10px #4f9dff;
    }

    /* SECTIONS */
    .section {
      display: none;
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .active {
      display: block;
    }

    h1 {
      font-size: 60px;
      margin-top: 40px;
      color: #4f9dff;
      text-shadow: 0 0 10px #4f9dff, 0 0 30px #4f9dff;
    }

    .images {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .images img {
      width: 300px;
      border-radius: 12px;
      border: 2px solid #4f9dff;
      box-shadow: 0 0 20px #4f9dff;
    }

    .socials a {
      display: inline-block;
      margin: 15px;
      font-size: 32px;
      color: white;
      transition: 0.3s;
    }

    .socials a:hover {
      color: #4f9dff;
      transform: scale(1.2);
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <a onclick="showSection('about')">About</a>
    <a onclick="showSection('socials')">Socials</a>
  </div>

  <!-- ABOUT -->
  <div id="about" class="section active">
    <h1>ANIRUDH 67</h1>
    <p>welcome to el anirudh 67.web!1!!</p>

    <div class="images">
      <img src="image1.jpg">
      <img src="image2.jpg">
    </div>
  </div>

  <!-- SOCIALS -->
  <div id="socials" class="section">
    <h2>Socials</h2>

    <div class="socials">
      <a href="https://instagram.com/pro191013" target="_blank">
        <i class="fab fa-instagram"></i>
      </a>

      <a href="https://snapchat.com/add/pro_king699" target="_blank">
        <i class="fab fa-snapchat"></i>
      </a>

      <a href="https://www.tiktok.com/@pro_king690" target="_blank">
        <i class="fab fa-tiktok"></i>
      </a>

      <a href="https://wa.me/447349901324" target="_blank">
        <i class="fab fa-whatsapp"></i>
      </a>
    </div>
  </div>

  <!-- JS -->
  <script>
    function showSection(id) {
      document.querySelectorAll('.section').forEach(section => {
        section.classList.remove('active');
      });

      document.getElementById(id).classList.add('active');
    }
  </script>

</body>
</html>
