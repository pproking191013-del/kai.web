<!DOCTYPE html>
<html>
<head>
  <title>Kaiweb</title>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      transition: 0.3s;
    }

    /* THEMES */
    body.dark {
      color: white;
      background: black;
    }

    body.light {
      color: black;
      background: white;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 15px;
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    body.dark .navbar {
      background: rgba(0,0,0,0.6);
    }

    body.light .navbar {
      background: rgba(255,255,255,0.7);
    }

    .navbar a {
      cursor: pointer;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }

    body.dark .navbar a {
      color: white;
    }

    body.light .navbar a {
      color: black;
    }

    .navbar a:hover {
      color: #a855f7;
    }

    /* TOGGLE BUTTON */
    .toggle {
      position: absolute;
      right: 20px;
      cursor: pointer;
      font-size: 20px;
    }

    /* SECTIONS */
    .section {
      position: absolute;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;

      opacity: 0;
      transform: translateY(20px);
      transition: 0.4s;
      pointer-events: none;
    }

    .section.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* BACKGROUNDS */
    body.dark #about {
      background: linear-gradient(135deg, #000000, #4c1d95);
    }

    body.dark #projects {
      background: linear-gradient(135deg, #020617, #1e3a8a);
    }

    body.dark #contact {
      background: linear-gradient(135deg, #000000, #312e81);
    }

    body.light #about {
      background: linear-gradient(135deg, #ffffff, #e9d5ff);
    }

    body.light #projects {
      background: linear-gradient(135deg, #ffffff, #dbeafe);
    }

    body.light #contact {
      background: linear-gradient(135deg, #ffffff, #ddd6fe);
    }

    h1 {
      font-size: 60px;
      margin: 0;
      color: #a855f7;
      text-shadow: 0 0 10px #a855f7;
    }

    p {
      max-width: 500px;
      opacity: 0.8;
    }

    /* SOCIALS */
    .socials a {
      margin: 15px;
      font-size: 30px;
      transition: 0.3s;
    }

    body.dark .socials a {
      color: white;
    }

    body.light .socials a {
      color: black;
    }

    .socials a:hover {
      color: #a855f7;
      transform: scale(1.3);
    }

  </style>
</head>

<body class="dark">

  <!-- NAVBAR -->
  <div class="navbar">
    <a onclick="showSection('about')">About</a>
    <a onclick="showSection('projects')">Projects</a>
    <a onclick="showSection('contact')">Contact</a>

    <span class="toggle" onclick="toggleTheme()">🌙</span>
  </div>

  <!-- ABOUT -->
  <div id="about" class="section active">
    <h1>kaiweb</h1>
    <p>This is my website.</p>
  </div>

  <!-- PROJECTS -->
  <div id="projects" class="section">
    <h2>Projects</h2>
    <p>Projects coming soon...</p>
  </div>

  <!-- CONTACT -->
  <div id="contact" class="section">
    <h2>Contact</h2>

    <div class="socials">
      <a href="https://instagram.com/pro191013" target="_blank">
        <i class="fab fa-instagram"></i>
      </a>

      <a href="https://snapchat.com/add/pro_king699" target="_blank">
        <i class="fab fa-snapchat"></i>
      </a>

      <a href="https://www.tiktok.com/@pro_king690" target="_blank">
        <i class="fab fa-tiktok"></i>
      </a>

      <a href="https://wa.me/447349901324" target="_blank">
        <i class="fab fa-whatsapp"></i>
      </a>
    </div>
  </div>

  <!-- JS -->
  <script>
    function showSection(id) {
      document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active');
      });
      document.getElementById(id).classList.add('active');
    }

    function toggleTheme() {
      const body = document.body;
      const toggle = document.querySelector(".toggle");

      body.classList.toggle("dark");
      body.classList.toggle("light");

      if (body.classList.contains("light")) {
        toggle.textContent = "☀️";
        localStorage.setItem("theme", "light");
      } else {
        toggle.textContent = "🌙";
        localStorage.setItem("theme", "dark");
      }
    }

    // load saved theme
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme) {
      document.body.className = savedTheme;
      document.querySelector(".toggle").textContent =
        savedTheme === "light" ? "☀️" : "🌙";
    }
  </script>

</body>
</html>
