<!DOCTYPE html>
<html>
<head>
  <title>ANIRUDH</title>

  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 40px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      padding: 15px;
      z-index: 1000;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }

    .navbar a:hover {
      color: #4f9dff;
      text-shadow: 0 0 10px #4f9dff;
    }

    /* SECTIONS */
    .section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
    }

    /* DARK OVERLAY */
    .section::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 0;
    }

    .section * {
      position: relative;
      z-index: 1;
    }

    /* BACKGROUNDS */
    #about {
      background-image: url("image1.jpg");
    }

    #socials {
      background-image: url("image2.jpg");
    }

    h1 {
      font-size: 60px;
      letter-spacing: 3px;
      color: #4f9dff;
      text-shadow: 0 0 10px #4f9dff, 0 0 30px #4f9dff;
      animation: glow 2s infinite;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 10px #4f9dff; }
      50% { text-shadow: 0 0 40px #4f9dff, 0 0 80px #4f9dff; }
      100% { text-shadow: 0 0 10px #4f9dff; }
    }

    p {
      font-size: 20px;
      color: #d1d5db;
    }

    /* SOCIAL ICONS */
    .socials {
      margin-top: 30px;
    }

    .socials a {
      margin: 15px;
      font-size: 35px;
      color: white;
      transition: 0.3s;
    }

    .socials a:hover {
      color: #4f9dff;
      transform: scale(1.3);
      text-shadow: 0 0 15px #4f9dff;
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <a href="#about">About</a>
    <a href="#socials">Socials</a>
  </div>

  <!-- ABOUT -->
  <div class="section" id="about">
    <h1>ANIRUDH 67</h1>
    <p>my site fr 🔥</p>
  </div>

  <!-- SOCIALS -->
  <div class="section" id="socials">
    <h1>Socials</h1>

    <div class="socials">
      <a href="https://instagram.com/pro191013" target="_blank">
        <i class="fab fa-instagram"></i>
      </a>

      <a href="https://snapchat.com/add/pro_king699" target="_blank">
        <i class="fab fa-snapchat"></i>
      </a>

      <a href="https://www.tiktok.com/@pro_king690" target="_blank">
        <i class="fab fa-tiktok"></i>
      </a>

      <a href="https://wa.me/447349901324" target="_blank">
        <i class="fab fa-whatsapp"></i>
      </a>
    </div>
  </div>

</body>
</html>
