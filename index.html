<!DOCTYPE html>
<html>
<head>
  <title>KaiWeb</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: Arial, sans-serif;
      overflow: hidden;
      transition: background 0.5s ease, color 0.5s ease;
    }

    body.dark { background:#000; color:white; }
    body.light { background:#fff; color:black; }

    /* NAV */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .nav-links { display:flex; gap:30px; }

    .navbar a { cursor:pointer; text-decoration:none; }

    body.dark .navbar { background:rgba(0,0,0,0.4); }
    body.light .navbar { background:rgba(255,255,255,0.6); }

    body.dark .navbar a { color:white; }
    body.light .navbar a { color:black; }

    .toggle { cursor:pointer; font-size:22px; }

    /* SECTIONS (FIXED SLIDE) */
    .section {
      position: absolute;
      top: 0;
      left: 100%;
      width: 100%;
      height: 100vh;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      transition: left 0.6s cubic-bezier(0.77,0,0.175,1);
      background-size: 400% 400%;
      animation: gradientMove 15s ease infinite;

      will-change: transform;
    }

    .section.active { left: 0; z-index: 2; }
    .section.exit-left { left: -100%; }

    @keyframes gradientMove {
      0% { background-position:0% 50%; }
      50% { background-position:100% 50%; }
      100% { background-position:0% 50%; }
    }

    /* BG */
    body.dark #about { background: linear-gradient(270deg,#000,#4c1d95,#000); }
    body.dark #projects { background: linear-gradient(270deg,#020617,#1e3a8a,#020617); }
    body.dark #socials { background: linear-gradient(270deg,#000,#312e81,#000); }

    body.light #about { background: linear-gradient(270deg,#fff,#e9d5ff,#fff); }
    body.light #projects { background: linear-gradient(270deg,#fff,#dbeafe,#fff); }
    body.light #socials { background: linear-gradient(270deg,#fff,#ddd6fe,#fff); }

    h1 {
      font-size: 70px;
      color: #a855f7;
      text-shadow: 0 0 20px #a855f7;
    }

    p { margin-top:10px; opacity:0.8; }

    /* PROJECT */
    .project {
      margin-top:30px;
      padding:20px;
      border-radius:12px;
      background: rgba(255,255,255,0.05);
      width:300px;
    }

    iframe {
      margin-top:10px;
      width:100%;
      height:250px;
      border:none;
      border-radius:10px;
      box-shadow:0 0 20px #a855f7;
    }

    /* SOCIALS */
    .socials a {
      margin:15px;
      font-size:30px;
      color:inherit;
      transition:0.3s;
    }

    .socials a:hover {
      color:#a855f7;
      transform:scale(1.2);
    }

  </style>
</head>

<body>

  <div class="navbar">
    <div class="nav-links">
      <a onclick="showSection('about')">About</a>
      <a onclick="showSection('projects')">Projects</a>
      <a onclick="showSection('socials')">Socials</a>
    </div>
    <span class="toggle" onclick="toggleTheme()">🌙</span>
  </div>

  <!-- ABOUT -->
  <div class="section active" id="about">
    <h1 id="typing"></h1>
    <p>clean. simple. mine.</p>
  </div>

  <!-- PROJECTS -->
  <div class="section" id="projects">
    <h1>projects</h1>
    <div class="project">
      <h2>To-Do App</h2>
      <iframe src="todo.html"></iframe>
    </div>
  </div>

  <!-- SOCIALS -->
  <div class="section" id="socials">
    <h1>socials</h1>
    <div class="socials">
      <a href="https://instagram.com/pro191013" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://snapchat.com/add/pro_king699" target="_blank"><i class="fab fa-snapchat"></i></a>
      <a href="https://www.tiktok.com/@pro_king690" target="_blank"><i class="fab fa-tiktok"></i></a>
      <a href="https://wa.me/447349901324" target="_blank"><i class="fab fa-whatsapp"></i></a>
    </div>
  </div>

  <script>
    function showSection(id) {
      const current = document.querySelector('.section.active');
      const next = document.getElementById(id);

      if (current === next) return;

      next.style.left = "100%";
      next.classList.add("active");

      setTimeout(() => {
        next.style.left = "0";
        current.style.left = "-100%";
      }, 10);

      setTimeout(() => {
        current.classList.remove("active");
        current.style.left = "100%";
      }, 600);
    }

    function setTheme(theme) {
      document.body.className = theme;
      document.querySelector('.toggle').textContent = theme === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
      const current = document.body.classList.contains('dark') ? 'dark' : 'light';
      setTheme(current === 'dark' ? 'light' : 'dark');
    }

    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    setTheme(saved || (prefersDark ? 'dark' : 'light'));

    // typing
    const text = "kaiweb";
    let i = 0;
    function type() {
      if (i < text.length) {
        document.getElementById("typing").innerHTML += text[i];
        i++;
        setTimeout(type, 120);
      }
    }
    type();
  </script>

</body>
</html>
