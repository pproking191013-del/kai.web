<!DOCTYPE html>
<html>
<head>
  <title>Kaiweb</title>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden; /* no scrolling */
      background: black;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 40px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      padding: 15px;
      z-index: 1000;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .navbar a:hover {
      color: #a855f7;
      text-shadow: 0 0 10px #a855f7;
    }

    /* SECTIONS */
    .section {
      position: absolute;
      width: 100%;
      height: 100vh;
      top: 0;
      left: 0;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;

      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease;

      pointer-events: none;
    }

    .section.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* BACKGROUNDS */
    #about {
      background: linear-gradient(135deg, #000000, #4c1d95);
    }

    #projects {
      background: linear-gradient(135deg, #020617, #1e3a8a);
    }

    #contact {
      background: linear-gradient(135deg, #000000, #312e81);
    }

    h1 {
      font-size: 60px;
      margin: 0;
      color: #a855f7;
      text-shadow: 0 0 10px #a855f7, 0 0 30px #a855f7;
    }

    h2 {
      margin-bottom: 20px;
    }

    p {
      color: #d1d5db;
      max-width: 500px;
    }

    /* PROJECT CARDS */
    .projects {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: rgba(0,0,0,0.4);
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      transition: 0.3s;
      backdrop-filter: blur(5px);
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 20px #a855f7;
    }

    /* SOCIAL ICONS */
    .socials a {
      margin: 15px;
      font-size: 30px;
      color: white;
      transition: 0.3s;
    }

    .socials a:hover {
      color: #a855f7;
      transform: scale(1.3);
      text-shadow: 0 0 15px #a855f7;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <a onclick="showSection('about')">About</a>
    <a onclick="showSection('projects')">Projects</a>
    <a onclick="showSection('contact')">Contact</a>
  </div>

  <!-- ABOUT -->
  <div id="about" class="section active">
    <h1>kaiweb</h1>
    <p>I’m learning web development and building my first projects.</p>
  </div>

  <!-- PROJECTS -->
  <div id="projects" class="section">
    <h2>Projects</h2>

    <div class="projects">
      <div class="card">
        <h3>Portfolio Website</h3>
        <p>This website built using HTML & CSS.</p>
      </div>

      <div class="card">
        <h3>Coming Soon</h3>
        <p>More projects will be added here.</p>
      </div>
    </div>
  </div>

  <!-- CONTACT -->
  <div id="contact" class="section">
    <h2>Contact</h2>

    <div class="socials">
      <a href="https://instagram.com/pro191013" target="_blank">
        <i class="fab fa-instagram"></i>
      </a>

      <a href="https://snapchat.com/add/pro_king699" target="_blank">
        <i class="fab fa-snapchat"></i>
      </a>

      <a href="https://www.tiktok.com/@pro_king690" target="_blank">
        <i class="fab fa-tiktok"></i>
      </a>

      <a href="https://wa.me/447349901324" target="_blank">
        <i class="fab fa-whatsapp"></i>
      </a>
    </div>
  </div>

  <!-- JS -->
  <script>
    function showSection(id) {
      document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active');
      });

      setTimeout(() => {
        document.getElementById(id).classList.add('active');
      }, 50);
    }
  </script>

</body>
</html>
