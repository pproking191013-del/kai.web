<!DOCTYPE html>
<html>
<head>
  <title>KaiWeb</title>

  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      overflow: hidden;
      transition: background 0.5s ease, color 0.5s ease;
    }

    /* BASE BG (prevents white flash) */
    body.dark {
      background: #000;
      color: white;
    }

    body.light {
      background: #fff;
      color: black;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      backdrop-filter: blur(10px);
      z-index: 1000;
      transition: background 0.5s ease;
    }

    .nav-links {
      display: flex;
      gap: 30px;
    }

    .navbar a {
      text-decoration: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .toggle {
      font-size: 22px;
      cursor: pointer;
    }

    /* DARK NAV */
    body.dark .navbar {
      background: rgba(0,0,0,0.4);
    }

    body.dark .navbar a {
      color: white;
    }

    body.dark .navbar a:hover {
      color: #a855f7;
    }

    /* LIGHT NAV */
    body.light .navbar {
      background: rgba(255,255,255,0.6);
    }

    body.light .navbar a {
      color: black;
    }

    body.light .navbar a:hover {
      color: #7c3aed;
    }

    /* SECTIONS (SLIDE SYSTEM) */
    .section {
      position: absolute;
      top: 0;
      left: 100%;

      width: 100%;
      height: 100vh;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      transition: all 0.6s cubic-bezier(0.77, 0, 0.175, 1);

      background-size: 400% 400%;
      animation: gradientMove 15s ease infinite;

      z-index: 0;
    }

    .section.active {
      left: 0;
      z-index: 2;
    }

    .section.exit-left {
      left: -100%;
    }

    .section.enter-right {
      left: 100%;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* BACKGROUNDS */
    body.dark #about {
      background: linear-gradient(270deg, #000000, #4c1d95, #000000);
    }

    body.dark #projects {
      background: linear-gradient(270deg, #020617, #1e3a8a, #020617);
    }

    body.dark #contact {
      background: linear-gradient(270deg, #000000, #312e81, #000000);
    }

    body.light #about {
      background: linear-gradient(270deg, #ffffff, #e9d5ff, #ffffff);
    }

    body.light #projects {
      background: linear-gradient(270deg, #ffffff, #dbeafe, #ffffff);
    }

    body.light #contact {
      background: linear-gradient(270deg, #ffffff, #ddd6fe, #ffffff);
    }

    /* TEXT */
    h1 {
      font-size: 70px;
      color: #a855f7;
      text-shadow: 0 0 20px #a855f7;
    }

    p {
      margin-top: 10px;
      opacity: 0.8;
    }

    /* PROJECT CARD */
    .project {
      margin-top: 30px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      width: 300px;
    }

    iframe {
      margin-top: 10px;
      width: 100%;
      height: 250px;
      border: none;
      border-radius: 10px;
      box-shadow: 0 0 20px #a855f7;
    }

    /* SOCIALS */
    .socials a {
      margin: 15px;
      font-size: 30px;
      color: inherit;
      transition: 0.3s;
    }

    .socials a:hover {
      color: #a855f7;
      transform: scale(1.2);
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="nav-links">
      <a onclick="showSection('about')">About</a>
      <a onclick="showSection('projects')">Projects</a>
      <a onclick="showSection('contact')">Contact</a>
    </div>

    <span class="toggle" onclick="toggleTheme()">🌙</span>
  </div>

  <!-- ABOUT -->
  <div class="section active" id="about">
    <h1 id="typing"></h1>
    <p>clean. simple. mine.</p>
  </div>

  <!-- PROJECTS -->
  <div class="section" id="projects">
    <h1>projects</h1>

    <div class="project">
      <h2>To-Do App</h2>
      <p>live preview</p>

      <iframe src="todo.html"></iframe>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="section" id="contact">
    <h1>socials</h1>

    <div class="socials">
      <a href="https://instagram.com/pro191013" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://snapchat.com/add/pro_king699" target="_blank"><i class="fab fa-snapchat"></i></a>
      <a href="https://www.tiktok.com/@pro_king690" target="_blank"><i class="fab fa-tiktok"></i></a>
      <a href="https://wa.me/447349901324" target="_blank"><i class="fab fa-whatsapp"></i></a>
    </div>
  </div>

  <!-- JS -->
  <script>
    function showSection(id) {
      const current = document.querySelector('.section.active');
      const next = document.getElementById(id);

      if (current === next) return;

      document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active', 'exit-left', 'enter-right');
      });

      next.classList.add('enter-right');
      next.offsetHeight;

      current.classList.add('exit-left');
      next.classList.add('active');
    }

    function setTheme(theme) {
      document.body.classList.remove('dark', 'light');
      document.body.classList.add(theme);

      const toggle = document.querySelector('.toggle');
      toggle.textContent = theme === 'dark' ? '🌙' : '☀️';

      localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
      const current = document.body.classList.contains('dark') ? 'dark' : 'light';
      setTheme(current === 'dark' ? 'light' : 'dark');
    }

    // INIT THEME
    const savedTheme = localStorage.getItem('theme');

    if (savedTheme) {
      setTheme(savedTheme);
    } else {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      setTheme(prefersDark ? 'dark' : 'light');
    }

    // TYPING ANIMATION
    const text = "kaiweb";
    let i = 0;

    function type() {
      if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 120);
      }
    }

    type();
  </script>

</body>
</html>
