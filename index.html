<!DOCTYPE html>
<html>
<head>
  <title>KaiWeb</title>

  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      overflow: hidden;
      transition: 0.3s;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .nav-links {
      display: flex;
      gap: 30px;
    }

    .navbar a {
      text-decoration: none;
      cursor: pointer;
      transition: 0.3s;
    }

    /* DARK NAV */
    body.dark .navbar a {
      color: white;
    }

    body.dark .navbar a:hover {
      color: #a855f7;
      text-shadow: 0 0 10px #a855f7;
    }

    body.dark .navbar {
      background: rgba(0,0,0,0.4);
    }

    /* LIGHT NAV */
    body.light .navbar a {
      color: black;
    }

    body.light .navbar a:hover {
      color: #7c3aed;
    }

    body.light .navbar {
      background: rgba(255,255,255,0.6);
    }

    .toggle {
      font-size: 22px;
      cursor: pointer;
    }

    /* SECTIONS */
    .section {
      position: absolute;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      background-size: 400% 400%;
      animation: gradientMove 15s ease infinite;
    }

    .active {
      opacity: 1;
      pointer-events: all;
    }

    /* BACKGROUNDS */
    body.dark #about {
      background: linear-gradient(270deg, #000000, #4c1d95, #000000);
    }

    body.dark #projects {
      background: linear-gradient(270deg, #020617, #1e3a8a, #020617);
    }

    body.dark #contact {
      background: linear-gradient(270deg, #000000, #312e81, #000000);
    }

    body.light #about {
      background: linear-gradient(270deg, #ffffff, #e9d5ff, #ffffff);
    }

    body.light #projects {
      background: linear-gradient(270deg, #ffffff, #dbeafe, #ffffff);
    }

    body.light #contact {
      background: linear-gradient(270deg, #ffffff, #ddd6fe, #ffffff);
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* TEXT */
    h1 {
      font-size: 70px;
      color: #a855f7;
      text-shadow: 0 0 20px #a855f7;
    }

    p {
      margin-top: 10px;
      opacity: 0.8;
    }

    /* PROJECT CARD */
    .project {
      margin-top: 30px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .project:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #a855f7;
    }

    /* SOCIALS */
    .socials a {
      margin: 15px;
      font-size: 30px;
      color: inherit;
      transition: 0.3s;
    }

    .socials a:hover {
      color: #a855f7;
      transform: scale(1.2);
      text-shadow: 0 0 15px #a855f7;
    }

  </style>
</head>

<body class="dark">

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="nav-links">
      <a onclick="showSection('about')">About</a>
      <a onclick="showSection('projects')">Projects</a>
      <a onclick="showSection('contact')">Contact</a>
    </div>

    <span class="toggle" onclick="toggleTheme()">🌙</span>
  </div>

  <!-- ABOUT -->
  <div class="section active" id="about">
    <h1>kaiweb</h1>
    <p>clean. simple. mine.</p>
  </div>

  <!-- PROJECTS -->
  <div class="section" id="projects">
    <h1>projects</h1>

    <div class="project">
      <h2>To-Do App</h2>
      <p>a simple task manager i built</p>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="section" id="contact">
    <h1>socials</h1>

    <div class="socials">
      <a href="https://instagram.com/pro191013" target="_blank">
        <i class="fab fa-instagram"></i>
      </a>

      <a href="https://snapchat.com/add/pro_king699" target="_blank">
        <i class="fab fa-snapchat"></i>
      </a>

      <a href="https://www.tiktok.com/@pro_king690" target="_blank">
        <i class="fab fa-tiktok"></i>
      </a>

      <a href="https://wa.me/447349901324" target="_blank">
        <i class="fab fa-whatsapp"></i>
      </a>
    </div>
  </div>

  <!-- JS -->
  <script>
    function showSection(id) {
      document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active');
      });
      document.getElementById(id).classList.add('active');
    }

    function toggleTheme() {
      const body = document.body;
      const toggle = document.querySelector('.toggle');

      body.classList.toggle('light');
      body.classList.toggle('dark');

      toggle.textContent = body.classList.contains('dark') ? '🌙' : '☀️';
    }
  </script>

</body>
</html>
